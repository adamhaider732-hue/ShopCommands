name: ShopCommands
version: 1.0.0
main: online.prismsmp.shopcommands.ShopCommands
api-version: '1.21'
description: Prism SMP shop commands, spawn, and vanish system

commands:
  commonshop:
    description: Open common crate shop
  uncommonshop:
    description: Open uncommon crate shop
  rareshop:
    description: Open rare crate shop
  epicshop:
    description: Open epic crate shop
  legendaryshop:
    description: Open legendary crate shop
  keyshopnpc:
    description: Open key shop
  keyshop:
    description: Open key shop
  rules:
    description: Open rules GUI
  homenpc:
    description: Open home NPC GUI
  discordnpc:
    description: Open discord NPC GUI
  lbnpc:
    description: Open leaderboard NPC GUI
  commands:
    description: Open commands GUI
  cmds:
    description: Open commands GUI
  mystats:
    description: Open stats GUI
  spawn:
    description: Teleport to spawn
  vanish:
    description: Toggle vanish mode
    aliases: [v]
    permission: prismsmp.vanish
    permission-message: You don't have permission to use this command.

permissions:
  prismsmp.vanish:
    description: Allows toggling vanish mode
    default: op
  prismsmp.vanish.see:
    description: Allows seeing vanished players
    default: op
