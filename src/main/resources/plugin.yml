name: ShopCommands
version: '1.1.0'
main: online.prismsmp.shopcommands.ShopCommands
api-version: '1.21.1'
author: PrismSMP
description: Opens zMenu inventories for all players regardless of permissions

commands:
  # Crate shops
  commonshop:
    description: Open Common crate shop
  uncommonshop:
    description: Open Uncommon crate shop
  rareshop:
    description: Open Rare crate shop
  epicshop:
    description: Open Epic crate shop
  legendaryshop:
    description: Open Legendary crate shop
  keyshopnpc:
    description: Open key shop NPC GUI
  keyshop:
    description: Open key shop (alias)

  # NPC GUIs
  rules:
    description: View server rules
  homenpc:
    description: Open home manager
  discordnpc:
    description: Open Discord GUI
  lbnpc:
    description: View leaderboards and personal stats
    aliases:
      - mystats
  commands:
    description: View all available player commands
    aliases:
      - cmds
