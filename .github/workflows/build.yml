name: Build ShopCommands
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: mvn package -B
      - uses: actions/upload-artifact@v3
        with:
          name: ShopCommands
          path: target/ShopCommands-1.0.0.jar
